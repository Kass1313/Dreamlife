<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raphy & Mehdi - Notre Histoire</title>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;

font-family:
"Segoe UI",
Arial,
sans-serif;

background:#000;

overflow-x:hidden;

color:white;

}


/* ======================
   CONTENEUR PRINCIPAL
====================== */


#app{

width:100%;

min-height:100vh;

position:relative;

}



/* ======================
   FILM CINEMA
====================== */


#film{

position:relative;

height:100vh;

overflow:hidden;

background:#000;

}



/* caméra */

.camera{

position:absolute;

inset:0;

transform-origin:center;

animation:
cameraMove 12s infinite alternate;

}



@keyframes cameraMove{


0%{

transform:
scale(1)
translateX(0);

}


100%{

transform:
scale(1.12)
translateX(-25px);

}

}





/* couches décor */


.layer{

position:absolute;

inset:0;

}




.sky{


background:

linear-gradient(

180deg,

#6ec6ff,

#ffd7a3

);


}




.ground{


top:60%;


background:


linear-gradient(

180deg,

#6fae45,

#2d6b30

);


}





.sun{


background:

radial-gradient(

circle at 75% 25%,

rgba(255,240,170,.9),

transparent 30%

);


}




/* particules */


.particles span{


position:absolute;


width:6px;

height:6px;


border-radius:50%;


background:white;


opacity:.5;


animation:

particle 10s linear infinite;


}




@keyframes particle{


0%{


transform:

translateY(100vh);

opacity:0;


}


50%{

opacity:.8;

}


100%{


transform:

translateY(-20vh);


opacity:0;


}



}





/* ======================
   PERSONNAGES
====================== */


.character{


position:absolute;


bottom:8%;


transition:

all 2s ease;


animation:

idle 4s infinite;


}



@keyframes idle{


0%,100%{

transform:

translateY(0);

}


50%{

transform:

translateY(-12px);

}



}



.character img{


width:240px;


filter:

drop-shadow(

0 20px 20px

rgba(0,0,0,.4)

);


}





/* ======================
   TEXTE CINEMA
====================== */


.dialogue{


position:absolute;


bottom:12%;


left:50%;


transform:

translateX(-50%);



width:70%;


padding:22px;


background:

rgba(0,0,0,.65);


border-radius:25px;


font-size:24px;


text-align:center;


backdrop-filter:

blur(10px);


animation:

appear .8s;


}



@keyframes appear{


from{


opacity:0;


transform:

translate(-50%,40px);


}


to{


opacity:1;


transform:

translate(-50%,0);


}



}




/* ======================
   BOUTONS
====================== */


button{


border:none;


padding:15px 30px;


border-radius:30px;


background:#ff4d88;


color:white;


font-size:18px;


cursor:pointer;


}



button:hover{


transform:scale(1.05);


}





/* écran accueil */


.screen{


min-height:100vh;


display:flex;


flex-direction:column;


align-items:center;


justify-content:center;


gap:25px;


background:

linear-gradient(

135deg,

#ff9a9e,

#fad0c4

);


}



h1{


font-size:45px;


text-align:center;


}




</style>


</head>


<body>


<div id="app">



<div class="screen" id="home">


<h1>
❤️ Raphy & Mehdi ❤️
</h1>


<p>
Une histoire pas comme les autres
</p>


<button onclick="startFilm()">

Lancer le film 🎬

</button>


</div>




<div id="film" style="display:none;">



</div>



</div>

</div>

</div>



</div>
<script>


/* =====================================
   MINI JEUX
===================================== */


function showGame(title,text){


let app=document.querySelector("#app");


let box=document.createElement("div");


box.className="screen";


box.innerHTML=`

<h1>${title}</h1>

<p>${text}</p>


<button onclick="winGame(this)">

Jouer ❤️

</button>


`;



app.appendChild(box);



}



function winGame(btn){


btn.parentElement.innerHTML=`

<h1>
Bravo 🎉
</h1>

<p>
Le souvenir est débloqué ❤️
</p>


<button onclick="this.parentElement.remove()">

Continuer 🎬

</button>


`;



}





/* =====================================
   PETITS MOMENTS ENTRE SCENES
===================================== */


function memoryMoment(){


let moments=[


"Un sourire.",

"Un fou rire.",

"Une journée spéciale.",

"Un souvenir gravé."


];


return moments[
Math.floor(
Math.random()*moments.length
)
];


}







/* =====================================
   FIN CINEMA
===================================== */


function finalMovie(){



let film=document.querySelector("#film");



film.innerHTML=`


<div class="camera">


<div class="layer"

style="

background:

linear-gradient(

#111,

#000

);

">

</div>




<div class="dialogue">


❤️


<br><br>


Raphy & Mehdi


<br>


Une histoire qui continue...


</div>




</div>



`;



setTimeout(()=>{


film.innerHTML+=`


<div class="screen">


<h1>
FIN 🎬
</h1>


<p>
Merci d'avoir regardé ❤️
</p>



<button onclick="location.reload()">

Revoir l'histoire

</button>


</div>


`;


},6000);



}





/* =====================================
   VOIX CINEMA
===================================== */


function speak(text){



if(!window.speechSynthesis)
return;



let msg=new SpeechSynthesisUtterance(text);



msg.lang="fr-FR";


msg.rate=.9;


msg.pitch=1;



speechSynthesis.cancel();


speechSynthesis.speak(msg);



}





/* =====================================
   RACCOURCIS
===================================== */


document.addEventListener(

"keydown",

e=>{


if(e.key===" ")

nextScene();



if(e.key==="g")

showGame(
"Souvenir surprise",
memoryMoment()
);



});





</script>
